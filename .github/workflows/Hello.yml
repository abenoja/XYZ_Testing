# This is a basic workflow to help you get started with Actions

name: Hello

# Controls when the workflow will run
on:
  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:
    inputs:
      HALO_TARGET:
        required: true
        type: string
      HALO_TICKET:
        required: true
        type: string
      GUEST_DISPLAYNAME:
        required: true
        type: string
      GUEST_EMAIL:
        required: true
        type: string
      OPTIONS:
        required: true
        type: string
# A workflow run is made up of one or more jobs that can run sequentially or in parallel
jobs:
  # This workflow contains a single job called "build"
  build:
    # The type of runner that the job will run on
    runs-on: ubuntu-latest

    # Steps represent a sequence of tasks that will be executed as part of the job
    steps:
      - name: checkout
        uses: actions/checkout@master
      - name: setup python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11" # install the Python version needed
      - name: install python packages
        run: |
          python -m pip install --upgrade pip
          pip install msal
          pip freeze > requirements.txt
          pip install -r requirements.txt
      # Runs a single command using the runners shell
      - name: Run a one-line script
        run: echo Hello, world!

      # Runs a set of commands using the runners shell
      - name: Run a multi-line script
        run: |
          echo Add other actions to build,
          echo test, and deploy your project.
          echo ${{ inputs.HALO_TARGET }} ${{ inputs.HALO_TICKET }} ${{ inputs.GUEST_DISPLAYNAME }} ${{ inputs.GUEST_EMAIL }} ${{ inputs.OPTIONS }}
      - name: execute Python script
        run: python CheckParam.py ${{ inputs.HALO_TARGET }} ${{ inputs.HALO_TICKET }} ${{ inputs.GUEST_DISPLAYNAME }} ${{ inputs.GUEST_EMAIL }} ${{ inputs.OPTIONS }} 
